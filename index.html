    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the JavaScript event loop?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The event loop is the mechanism that lets single-threaded JavaScript handle asynchronous work. When the call stack is empty it runs one macrotask (such as a setTimeout callback), then drains the entire microtask queue (Promise callbacks, await continuations, queueMicrotask), optionally renders, and repeats."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between a macrotask and a microtask?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Macrotasks come from setTimeout, setInterval, I/O and UI events; one runs per loop turn. Microtasks come from Promises, async/await and queueMicrotask; the entire microtask queue is drained after each macrotask and before the next one or any rendering. That is why a resolved Promise callback runs before a setTimeout(0) callback."
          }
        },
        {
          "@type": "Question",
          "name": "Why does setTimeout(fn, 0) not run immediately?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The 0 is a minimum delay, not an exact one. The callback only runs after the current synchronous code finishes, the call stack is empty, all microtasks have drained, and earlier macrotasks ahead of it are done — and browsers also clamp nested timers."
          }
        }
      ]
    }
    </script>
